<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <filter id="orbitGlowLarge" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="coreGlowLarge" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c76a" stop-opacity="1" />
      <stop offset="40%" stop-color="#d4a859" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#d4a859" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bgGradLarge" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#201530" />
      <stop offset="100%" stop-color="#160f22" />
    </radialGradient>
    <filter id="coreBloomLarge" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="96" cy="96" r="93" fill="url(#bgGradLarge)" />

  <!-- Outer orbit ring -->
  <ellipse
    cx="96" cy="96"
    rx="66" ry="84"
    fill="none"
    stroke="#a382d8"
    stroke-width="4"
    opacity="0.4"
    filter="url(#orbitGlowLarge)"
    transform="rotate(25 96 96)"
  />

  <!-- Middle orbit ring -->
  <ellipse
    cx="96" cy="96"
    rx="78" ry="48"
    fill="none"
    stroke="#b89ddd"
    stroke-width="4"
    opacity="0.65"
    filter="url(#orbitGlowLarge)"
    transform="rotate(-15 96 96)"
  />

  <!-- Inner orbit ring -->
  <ellipse
    cx="96" cy="96"
    rx="60" ry="75"
    fill="none"
    stroke="#c4aaee"
    stroke-width="4"
    opacity="0.85"
    filter="url(#orbitGlowLarge)"
    transform="rotate(62 96 96)"
  />

  <!-- Core glow halo -->
  <circle cx="96" cy="96" r="18" fill="url(#coreGlowLarge)" filter="url(#coreBloomLarge)" />

  <!-- Core solid dot -->
  <circle cx="96" cy="96" r="9" fill="#d4a859" />
</svg>

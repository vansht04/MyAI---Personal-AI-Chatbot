<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="orbitGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c76a" stop-opacity="1" />
      <stop offset="40%" stop-color="#d4a859" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#d4a859" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#201530" />
      <stop offset="100%" stop-color="#160f22" />
    </radialGradient>
    <filter id="coreBloom" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="url(#bgGrad)" />

  <!-- Outer orbit ring -->
  <ellipse
    cx="32" cy="32"
    rx="22" ry="28"
    fill="none"
    stroke="#a382d8"
    stroke-width="1.8"
    opacity="0.4"
    filter="url(#orbitGlow)"
    transform="rotate(25 32 32)"
  />

  <!-- Middle orbit ring -->
  <ellipse
    cx="32" cy="32"
    rx="26" ry="16"
    fill="none"
    stroke="#b89ddd"
    stroke-width="1.8"
    opacity="0.65"
    filter="url(#orbitGlow)"
    transform="rotate(-15 32 32)"
  />

  <!-- Inner orbit ring -->
  <ellipse
    cx="32" cy="32"
    rx="20" ry="25"
    fill="none"
    stroke="#c4aaee"
    stroke-width="1.8"
    opacity="0.85"
    filter="url(#orbitGlow)"
    transform="rotate(62 32 32)"
  />

  <!-- Core glow halo -->
  <circle cx="32" cy="32" r="6" fill="url(#coreGlow)" filter="url(#coreBloom)" />

  <!-- Core solid dot -->
  <circle cx="32" cy="32" r="3" fill="#d4a859" />
</svg>
